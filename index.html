<!DOCTYPE html>
<html>
<head>
<style>
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a1a; }
  #chessboard { border: 3px solid #333; display: inline-block; }
  .chess-row { display: flex; }
  .chess-square { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; font-size: 36px; cursor: default; }
  .light { background: #f0d9b5; }
  .dark { background: #b58863; }
</style>
</head>
<body>
<div id="chessboard"></div>

<script>
    class Piece {
        constructor(type, options = {}) {
            this.type = type; // 'R', 'N', 'B', 'Q', 'K', 'P'
            this.name = options.name || null;
            this.material = options.material || null;
            this.style = options.style || null;
            this.svg = options.svg || null;
        }

        color() {
            return this.type === this.type.toUpperCase() ? 'white' : 'black';
        }
    }

    class ChessSet {
        constructor() {
            this.PIECE_SVG_TEMPLATES  = {
                P: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><path d="m 22.5,9 c -2.21,0 -4,1.79 -4,4 0,0.89 0.29,1.71 0.78,2.38 C 17.33,16.5 16,18.59 16,21 c 0,2.03 0.94,3.84 2.41,5.03 C 15.41,27.09 11,31.58 11,39.5 H 34 C 34,31.58 29.59,27.09 26.59,26.03 28.06,24.84 29,23.03 29,21 29,18.59 27.67,16.5 25.72,15.38 26.21,14.71 26.5,13.89 26.5,13 c 0,-2.21 -1.79,-4 -4,-4 z" style="fill:{{FILL}};stroke:{{STROKE}};stroke-width:1.5;stroke-linecap:round;stroke-linejoin:miter"/></svg>`,
                R: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:{{FILL}};stroke:{{STROKE}};stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M 9,39 L 36,39 L 36,36 L 9,36 L 9,39 z" style="stroke-linecap:butt"/><path d="M 12,36 L 12,32 L 33,32 L 33,36 L 12,36 z" style="stroke-linecap:butt"/><path d="M 11,14 L 11,9 L 15,9 L 15,11 L 20,11 L 20,9 L 25,9 L 25,11 L 30,11 L 30,9 L 34,9 L 34,14" style="stroke-linecap:butt"/><path d="M 34,14 L 31,17 L 14,17 L 11,14"/><path d="M 31,17 L 31,29.5 L 14,29.5 L 14,17" style="stroke-linecap:butt;stroke-linejoin:miter"/><path d="M 31,29.5 L 32.5,32 L 12.5,32 L 14,29.5"/><path d="M 11,14 L 34,14" style="fill:none;stroke:{{STROKE}};stroke-linejoin:miter"/></g></svg>`,
                N: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:none;stroke:{{STROKE}};stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M 22,10 C 32.5,11 38.5,18 38,39 L 15,39 C 15,30 25,32.5 23,18" style="fill:{{FILL}};stroke:{{STROKE}}"/><path d="M 24,18 C 24.38,20.91 18.45,25.37 16,27 C 13,29 13.18,31.34 11,31 C 9.958,30.06 12.41,27.96 11,28 C 10,28 11.19,29.23 10,30 C 9,30 5.997,31 6,26 C 6,24 12,14 12,14 C 12,14 13.89,12.1 14,10.5 C 13.27,9.506 13.5,8.5 13.5,7.5 C 14.5,6.5 16.5,10 16.5,10 L 18.5,10 C 18.5,10 19.28,8.008 21,7 C 22,7 22,10 22,10" style="fill:{{FILL}};stroke:{{STROKE}}"/><path d="M 9.5 25.5 A 0.5 0.5 0 1 1 8.5,25.5 A 0.5 0.5 0 1 1 9.5 25.5 z" style="fill:{{STROKE}};stroke:{{STROKE}}"/><path d="M 15 15.5 A 0.5 1.5 0 1 1 14,15.5 A 0.5 1.5 0 1 1 15 15.5 z" transform="matrix(0.866,0.5,-0.5,0.866,9.693,-5.173)" style="fill:{{STROKE}};stroke:{{STROKE}}"/></g></svg>`,
                B: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:none;stroke:{{STROKE}};stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><g style="fill:{{FILL}};stroke:{{STROKE}};stroke-linecap:butt"><path d="M 9,36 C 12.39,35.03 19.11,36.43 22.5,34 C 25.89,36.43 32.61,35.03 36,36 C 36,36 37.65,36.54 39,38 C 38.32,38.97 37.35,38.99 36,38.5 C 32.61,37.53 25.89,38.96 22.5,37.5 C 19.11,38.96 12.39,37.53 9,38.5 C 7.65,38.99 6.68,38.97 6,38 C 7.35,36.54 9,36 9,36 z"/><path d="M 15,32 C 17.5,34.5 27.5,34.5 30,32 C 30.5,30.5 30,30 30,30 C 30,27.5 27.5,26 27.5,26 C 33,24.5 33.5,14.5 22.5,10.5 C 11.5,14.5 12,24.5 17.5,26 C 17.5,26 15,27.5 15,30 C 15,30 14.5,30.5 15,32 z"/><path d="M 25 8 A 2.5 2.5 0 1 1 20,8 A 2.5 2.5 0 1 1 25 8 z"/></g><path d="M 17.5,26 L 27.5,26 M 15,30 L 30,30 M 22.5,15.5 L 22.5,20.5 M 20,18 L 25,18" style="fill:none;stroke:{{STROKE}};stroke-linejoin:miter"/></g></svg>`,
                Q: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:{{FILL}};stroke:{{STROKE}};stroke-width:1.5;stroke-linejoin:round"><path d="M 9,26 C 17.5,24.5 30,24.5 36,26 L 38.5,13.5 L 31,25 L 30.7,10.9 L 25.5,24.5 L 22.5,10 L 19.5,24.5 L 14.3,10.9 L 14,25 L 6.5,13.5 L 9,26 z"/><path d="M 9,26 C 9,28 10.5,28 11.5,30 C 12.5,31.5 12.5,31 12,33.5 C 10.5,34.5 11,36 11,36 C 9.5,37.5 11,38.5 11,38.5 C 17.5,39.5 27.5,39.5 34,38.5 C 34,38.5 35.5,37.5 34,36 C 34,36 34.5,34.5 33,33.5 C 32.5,31 32.5,31.5 33.5,30 C 34.5,28 36,28 36,26 C 27.5,24.5 17.5,24.5 9,26 z"/><path d="M 11.5,30 C 15,29 30,29 33.5,30" style="fill:none"/><path d="M 12,33.5 C 18,32.5 27,32.5 33,33.5" style="fill:none"/><circle cx="6" cy="12" r="2"/><circle cx="14" cy="9" r="2"/><circle cx="22.5" cy="8" r="2"/><circle cx="31" cy="9" r="2"/><circle cx="39" cy="12" r="2"/></g></svg>`,
                K: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:none;stroke:{{STROKE}};stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M 22.5,11.63 L 22.5,6" style="stroke-linejoin:miter"/><path d="M 20,8 L 25,8" style="stroke-linejoin:miter"/><path d="M 22.5,25 C 22.5,25 27,17.5 25.5,14.5 C 25.5,14.5 24.5,12 22.5,12 C 20.5,12 19.5,14.5 19.5,14.5 C 18,17.5 22.5,25 22.5,25" style="fill:{{FILL}}"/><path d="M 12.5,37 C 18,40.5 27,40.5 32.5,37 L 32.5,30 C 32.5,30 41.5,25.5 38.5,19.5 C 34.5,13 25,16 22.5,23.5 L 22.5,27 L 22.5,23.5 C 20,16 10.5,13 6.5,19.5 C 3.5,25.5 12.5,30 12.5,30 L 12.5,37" style="fill:{{FILL}}"/><path d="M 12.5,30 C 18,27 27,27 32.5,30" style="fill:none"/><path d="M 12.5,33.5 C 18,30.5 27,30.5 32.5,33.5" style="fill:none"/><path d="M 12.5,37 C 18,34 27,34 32.5,37" style="fill:none"/></g></svg>`,
            }

            this.pieceNames = {
                'P': 'Pawn',
                'R': 'Rook',
                'N': 'Knight',
                'B': 'Bishop',
                'Q': 'Queen',
                'K': 'King'
            };

            this.pieces = [];
        }

        addPieces(piecesToAdd, options = {}) {
            piecesToAdd.forEach(type => {
                this.pieces.push(new Piece(type, { 
                    name: this.pieceNames[type.toUpperCase()],
                    svg: this.PIECE_SVG_TEMPLATES[type.toUpperCase()]
                        ? (() => {
                            const isBlack = type === type.toLowerCase();
                            const fill = options.material === 'plastic' ? 'green' : options.material === 'wood' ? 'brown' : isBlack ? '#333' : '#fff';
                            const stroke = options.material === 'plastic' ? 'darkgreen' : options.material === 'wood' ? 'saddlebrown' : isBlack ? '#fff' : '#000';
                            return this.PIECE_SVG_TEMPLATES[type.toUpperCase()].replace(/{{FILL}}/g, fill).replace(/{{STROKE}}/g, stroke);
                        })()
                        : null,
                    ...options
                }));
            });            
        }

        shufflePieces() {
            for (let i = this.pieces.length - 1; i > 0; i--) { // We iterate backwards through the array
                const j = Math.floor(Math.random() * (i + 1)); // Pick a random index from 0 to i
                [this.pieces[i], this.pieces[j]] = [this.pieces[j], this.pieces[i]]; // Swap elements using destructuring assignment
            }   
        }
    }

    class Chessboard {
        constructor() {
            this.board = this.createBoard();
            this.pieces = [];
        }

        attachPieces(pieces) {
            this.pieces = pieces;
        }

        createBoard() {
            const board = [];
            for (let i = 0; i < 8; i++) {
                const row = [];
                for (let j = 0; j < 8; j++) {
                    row.push(null); // Initialize empty squares
                }
                board.push(row);
            }
            return board;
        }

        setFen(fen) {
            const rows = fen.split(' ')[0].split('/');
            for (let i = 0; i < 8; i++) {
                let colIndex = 0;
                for (const char of rows[i]) {
                    if (isNaN(char)) {
                        const index = this.pieces.findIndex(p => p.type === char);
                        if (index !== -1) {
                            this.board[i][colIndex] = this.pieces[index];
                            this.pieces.splice(index, 1);
                        }
                        colIndex++;
                    } else {
                        colIndex += parseInt(char);
                    }
                }
            }
        }

        movePiece(from, to) {
            const [fromRow, fromCol] = this.parsePosition(from);
            const [toRow, toCol] = this.parsePosition(to);
            const piece = this.board[fromRow][fromCol];
            if (piece) {
                this.board[toRow][toCol] = piece; // Move piece
                this.board[fromRow][fromCol] = null; // Clear original square
            }
        }

        parsePosition(pos) {
            const col = pos.charCodeAt(0) - 'a'.charCodeAt(0);
            const row = 8 - parseInt(pos[1]);
            return [row, col];
        }

        moveAlgebraic(move) {
            move = move.replace(/[+#]$/, ''); // Strip check/checkmate indicators

            if (move === 'O-O' || move === '0-0') { // Castling
                const row = this.board[0].includes('K') ? 0 : 7;
                this.board[row][6] = this.board[row][4];
                this.board[row][5] = this.board[row][7];
                this.board[row][4] = null;
                this.board[row][7] = null;
                return;
            }
            if (move === 'O-O-O' || move === '0-0-0') {  // Castling
                const row = this.board[0].includes('K') ? 0 : 7;
                this.board[row][2] = this.board[row][4];
                this.board[row][3] = this.board[row][0];
                this.board[row][4] = null;
                this.board[row][0] = null;
                return;
            }

            const from = move.slice(0, 2); // Parse source and destination squares from coordinate notation (e.g. "e2e4", "e7e5")
            const to = move.slice(2, 4);
            const promotion = move[4] || null; // e.g. "e7e8q" → 'q'

            const [fromRow, fromCol] = this.parsePosition(from);
            const [toRow, toCol] = this.parsePosition(to);

            const piece = this.board[fromRow][fromCol];
            if (!piece) return;

            // En passant: pawn moves diagonally to an empty square
            const isPawn = piece === 'P' || piece === 'p';
            const isDiagonal = fromCol !== toCol;
            const targetEmpty = !this.board[toRow][toCol];
            if (isPawn && isDiagonal && targetEmpty) {
                this.board[fromRow][toCol] = null; // Remove the captured pawn (it sits on the same row as the moving pawn, not the destination)
            }

            if (promotion) { // Promotion
                this.board[toRow][toCol] = piece === 'P'
                    ? promotion.toUpperCase()
                    : promotion.toLowerCase();
            } else {
                this.board[toRow][toCol] = piece;
            }

            this.board[fromRow][fromCol] = null;
        }
    }

    class ChessBoardUI {
        constructor(chessboard) {
            this.chessboard = chessboard;
            this.boardElement = document.getElementById('chessboard');
            this.renderBoard();
        }

        renderBoard() {
            this.boardElement.innerHTML = ''; // Clear existing board
            for (let i = 0; i < 8; i++) {
                const rowElement = document.createElement('div');
                rowElement.classList.add('chess-row');
                for (let j = 0; j < 8; j++) {
                    const squareElement = document.createElement('div');
                    squareElement.classList.add('chess-square');
                    if ((i + j) % 2 === 0) {
                        squareElement.classList.add('light');
                    } else {
                        squareElement.classList.add('dark');
                    }
                    const piece = this.chessboard.board[i][j];
                    if (piece) {
                        squareElement.innerHTML = piece.svg;
                        squareElement.querySelector('svg').style.cssText = 'width:100%;height:100%';

                    }
                    rowElement.appendChild(squareElement);
                }
                this.boardElement.appendChild(rowElement);
            }
        }
    }
    
    const chessboard = new Chessboard();
    const chessSet = new ChessSet();
    const chessBoardUI = new ChessBoardUI(chessboard);

    chessSet.addPieces([
        'P', 'P', 'P'
    ], { material: 'plastic' });

    chessSet.addPieces([
        'P', 'P', 'P'
    ], { material: 'wood' });
    
    chessSet.addPieces([ 
        'P', 'P', 'P', 'P', 'P', 'P', 'P', 'P', 
        'R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R',
        'p', 'p', 'p', 'p', 'p', 'p', 'p', 'p',
        'r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'
    ], {});

    chessSet.shufflePieces();

    chessboard.attachPieces(chessSet.pieces);

    chessboard.setFen('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR');
    chessBoardUI.renderBoard();

    function toCoord(row, col) {
        return String.fromCharCode('a'.charCodeAt(0) + col) + (8 - row);
    }

    function randomMove() {
        const occupied = [];
        for (let i = 0; i < 8; i++)
            for (let j = 0; j < 8; j++)
                if (chessboard.board[i][j]) occupied.push([i, j]);

        if (!occupied.length) return;

        const [fromRow, fromCol] = occupied[Math.floor(Math.random() * occupied.length)];
        const toRow = Math.floor(Math.random() * 8);
        const toCol = Math.floor(Math.random() * 8);

        const move = toCoord(fromRow, fromCol) + toCoord(toRow, toCol);
        console.log('Random move:', move);
        chessboard.moveAlgebraic(move);
        chessBoardUI.renderBoard();
    }

    

</script>
<button onclick="randomMove()">Random Move</button>
</body>
</html>
