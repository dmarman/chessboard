  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

            this.style = options.style || 'classic';

                gold:    { fill: THEME.materialGoldFill,    stroke: THEME.materialGoldStroke    },
            };

        _resolveColors(piece) {
            if (this._materials[piece.material]) return this._materials[piece.material];
            const isBlack = piece.type === piece.type.toLowerCase();
            return { fill: isBlack ? THEME.pieceBlackFill : THEME.pieceWhiteFill, stroke: isBlack ? THEME.pieceBlackStroke : THEME.pieceWhiteStroke };
        }

        render(piece) {
            const styleName = piece.style || 'classic';
            const templates = this._styles[styleName] ?? this._styles.classic;
            const template = templates[piece.type.toUpperCase()];
            if (!template) return '';
            const { fill, stroke } = this._resolveColors(piece);
            return template.replace(/{{FILL}}/g, fill).replace(/{{STROKE}}/g, stroke);
        }

    class PngPieceTheme {
        constructor(spriteMap = {}) {
            this._sprites = {
                'p': 'sprites/p.png',
                'b': 'sprites/b.png',
                'r': 'sprites/r.png',
                'n': 'sprites/n.png',
                'q': 'sprites/q.png',
                'k': 'sprites/k.png',

                'P': 'sprites/pw.png',
                'B': 'sprites/bw.png',
                'R': 'sprites/rw.png',
                'N': 'sprites/nw.png',
                'Q': 'sprites/qw.png',
                'K': 'sprites/kw.png',
            }
        }

        render(piece) {
            const path = this._sprites[piece.type];
            if (!path) return null;
            return `<img src="${path}" alt="${piece.type}" draggable="false">`;
        }
    }

    class CompositePieceTheme {
        constructor(...themes) {
            this._themes = themes;
        }

        render(piece) {
            for (const theme of this._themes) {
                const result = theme.render(piece);
                if (result) return result;
            }
            return '';
        }
    }

    class ChessSet {
        constructor() {
            this.pieceNames = {
                'P': 'Pawn',
                'R': 'Rook',
                'N': 'Knight',
                'B': 'Bishop',
                'Q': 'Queen',
                'K': 'King'
            };

            this.pieces = [];
        }

        clearPieces() {
            this.pieces = [];
        }

        getPieces() {
            return [...this.pieces];
        }

        addPieces(piecesToAdd, options = {}) {
            piecesToAdd.forEach(type => {
                this.addPiece(type, options);
            });
        }

        addPiece(type, options = {}) {
            this.pieces.push(new Piece(type, {
                name: this.pieceNames[type.toUpperCase()],
                ...options
            }));
        }

        addPieceObject(piece) {
            this.pieces.push(piece);
        }

        shufflePieces() {
            for (let i = this.pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [this.pieces[i], this.pieces[j]] = [this.pieces[j], this.pieces[i]];
            }
        }
    }

    class Chessboard {
        constructor() {
            this._board = this.createBoard();
            this.pieces = [];
            this._listeners = {};
        }

        on(event, fn) {
            (this._listeners[event] ??= []).push(fn);
        }

        emit(event, data) {
            (this._listeners[event] ?? []).forEach(fn => fn(data));
        }

        getState() {
            return this._board.map(row => [...row]);
        }

        getPieceAt(pos) {
            const [row, col] = this.parsePosition(pos);
            return this._board[row][col];
        }

        createBoard() {
            return Array.from({length: 8}, () => Array(8).fill(null));
        }

        setPiecesFromFen(fen, pieces) {
            this.pieces = [...pieces];
            this._board = this.createBoard();
            this.pieces.forEach(p => p.onBoard = false);

            const rows = fen.split(' ')[0].split('/');
            for (let i = 0; i < 8; i++) {
                let colIndex = 0;
                for (const char of rows[i]) {
                    if (isNaN(char)) {
                        const index = this.pieces.findIndex(p => p.type === char && p.onBoard === false);
                        if (index !== -1) {
                            this._board[i][colIndex] = this.pieces[index];
                            this.pieces[index].onBoard = true;
                        }
                        colIndex++;
                    } else {
                        colIndex += parseInt(char);
                    }
                }
            }
        }

        parsePosition(pos) {
            const col = pos.charCodeAt(0) - 'a'.charCodeAt(0);
            const row = 8 - parseInt(pos[1]);
            return [row, col];
        }

        move({ from, to, captured: capturedType, promotion, isKingsideCastle, isQueensideCastle, player }) {
            const [fromRow, fromCol] = this.parsePosition(from);
            const [toRow, toCol] = this.parsePosition(to);

            if (isKingsideCastle) {
                const piece = this._board[fromRow][4];
                const rook = this._board[fromRow][7];
                this._board[fromRow][6] = piece;
                this._board[fromRow][5] = rook;
                this._board[fromRow][4] = null;
                this._board[fromRow][7] = null;
                this.emit('move', { piece, captured: null, fromRow, fromCol: 4, toRow: fromRow, toCol: 6, capturedRow: null, capturedCol: null, player });
                this.emit('move', { piece: rook, captured: null, fromRow, fromCol: 7, toRow: fromRow, toCol: 5, capturedRow: null, capturedCol: null, player });
                return;
            }

            if (isQueensideCastle) {
                const piece = this._board[fromRow][4];
                const rook = this._board[fromRow][0];
                this._board[fromRow][2] = piece;
                this._board[fromRow][3] = rook;
                this._board[fromRow][4] = null;
                this._board[fromRow][0] = null;
                this.emit('move', { piece, captured: null, fromRow, fromCol: 4, toRow: fromRow, toCol: 2, capturedRow: null, capturedCol: null, player });
                this.emit('move', { piece: rook, captured: null, fromRow, fromCol: 0, toRow: fromRow, toCol: 3, capturedRow: null, capturedCol: null, player });
                return;
            }

            const piece = this._board[fromRow][fromCol];
            if (!piece) return;

            let captured = this._board[toRow][toCol];
            let capturedRow = toRow, capturedCol = toCol;

            if (capturedType && !captured) {
                // en passant: captured pawn sits on moving pawn's rank, destination file
                captured = this._board[fromRow][toCol];
                this._board[fromRow][toCol] = null;
                capturedRow = fromRow;
                capturedCol = toCol;
            }

            if (promotion) {
                piece.type = piece.color() === 'white' ? promotion.toUpperCase() : promotion.toLowerCase();
            }

            this._board[toRow][toCol] = piece;
            this._board[fromRow][fromCol] = null;
            this.emit('move', { piece, captured, fromRow, fromCol, toRow, toCol,
                capturedRow: captured ? capturedRow : null,
                capturedCol: captured ? capturedCol : null,
                promotion: promotion || null, player });
        }
    }

    class ChessboardUI {
        constructor(element, options = {}) {
            this.boardElement = typeof element === 'string' ? document.getElementById(element) : element;
            this._uid = `cbui-${Math.random().toString(36).slice(2)}`;
            this.boardElement.classList.add(this._uid);
            this.squareSize = options.squareSize ?? 90;
            this._lightColor = options.lightColor ?? THEME.squareLight;
            this._darkColor = options.darkColor ?? THEME.squareDark;
            this._transitionMs = options.transitionMs ?? 150;
            this._shakeMs = options.shakeMs ?? 500;
            this._renderPiece = options.renderPiece ?? (() => '');
            this._orientation = options.orientation ?? 'white';
            this.pieceElements = new Map();
            this.piecesLayer = null;
            this._queue = [];
            this._draining = false;
            this._styleEl = this._injectStyles();
        }

        get lightColor() { return this._lightColor; }
        set lightColor(v) { this._lightColor = v; this._updateStyles(); }

        get darkColor() { return this._darkColor; }
        set darkColor(v) { this._darkColor = v; this._updateStyles(); }

        get transitionMs() { return this._transitionMs; }
        set transitionMs(v) { this._transitionMs = v; this._updateStyles(); }

        get shakeMs() { return this._shakeMs; }
        set shakeMs(v) { this._shakeMs = v; this._updateStyles(); }

        _injectStyles() {
            const el = document.createElement('style');
            document.head.appendChild(el);
            this._updateStyles(el);
            return el;
        }

        _updateStyles(el = this._styleEl) {
            const s = this.squareSize;
            const b = `.${this._uid}`;
            el.textContent = `
                ${b} { border: 3px solid ${THEME.boardBorder}; display: inline-block; position: relative; }
                ${b} .chess-row { display: flex; }
                ${b} .chess-square { width: ${s}px; height: ${s}px; }
                ${b} .chess-square.light { background: ${this._lightColor}; }
                ${b} .chess-square.dark { background: ${this._darkColor}; }
                ${b} .piece {
                    position: absolute;
                    width: ${s}px;
                    height: ${s}px;
                    transition: transform ${this._transitionMs}ms ease-in-out;
                    pointer-events: none;
                }
                ${b} .piece svg { width: 100%; height: 100%; }
                ${b} .piece img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

            `;
        }

        initBoard(initialState) {
            this.boardElement.innerHTML = '';
            this.pieceElements.clear();

            const squaresLayer = document.createElement('div');
            for (let i = 0; i < 8; i++) {
                const row = document.createElement('div');
                row.classList.add('chess-row');
                for (let j = 0; j < 8; j++) {
                    const sq = document.createElement('div');
                    sq.classList.add('chess-square', (i + j) % 2 === 0 ? 'light' : 'dark');
                    row.appendChild(sq);
                }
                squaresLayer.appendChild(row);
            }
            this.boardElement.appendChild(squaresLayer);

            this.piecesLayer = document.createElement('div');
            this.piecesLayer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none';
            this.boardElement.appendChild(this.piecesLayer);

            for (let i = 0; i < 8; i++)
                for (let j = 0; j < 8; j++) {
                    const piece = initialState[i][j];
                    if (piece) this.createPieceElement(piece, i, j);
                }
        }

        _posKey(row, col) { return `${row},${col}`; }

        _toVisual(row, col) {
            return this._orientation === 'black' ? [7 - row, 7 - col] : [row, col];
        }

        createPieceElement(piece, row, col) {
            const [vRow, vCol] = this._toVisual(row, col);
            const el = document.createElement('div');
            el.className = 'piece';
            el.style.top = `${vRow * this.squareSize}px`;
            el.style.left = `${vCol * this.squareSize}px`;
            el.innerHTML = this._renderPiece(piece);
            this.piecesLayer.appendChild(el);
            this.pieceElements.set(this._posKey(row, col), el);
            this._animateFloat(el);
            return el;
        }

        updatePiece(row, col, piece) {
            const el = this.pieceElements.get(this._posKey(row, col));
            if (el) el.innerHTML = this._renderPiece(piece);
        }

        queueMove(piece, captured, fromRow, fromCol, toRow, toCol, capturedRow, capturedCol, promotion = false, effect = null) {
            this._queue.push({ piece, captured, fromRow, fromCol, toRow, toCol, capturedRow, capturedCol, promotion, effect });
            if (!this._draining) this._drain();
        }

        async _drain() {
            this._draining = true;
            while (this._queue.length) {
                const m = this._queue.shift();
                await this._animateMove(m.piece, m.captured, m.fromRow, m.fromCol, m.toRow, m.toCol, m.capturedRow, m.capturedCol, m.promotion, m.effect);
            }
            this._draining = false;
        }

        async _runSteps(el, steps) {
            for (const step of steps) {
                if (Array.isArray(step)) await Promise.all(step.map(s => s(el)));
                else await step(el);
            }
        }

        async _animateSlide(el, dx, dy, toRow, toCol) {
            el._floatAnimation?.cancel();
            el._floatAnimation = null;
            el.style.zIndex = '1000';
            await el.animate([
                { transform: 'translate(0px, 0px)' },
                { transform: `translate(${dx}px, ${dy}px)` },
            ], { duration: this._transitionMs, easing: 'ease-in-out', fill: 'forwards' }).finished;
            el.style.top = `${toRow * this.squareSize}px`;
            el.style.left = `${toCol * this.squareSize}px`;
            el.getAnimations().forEach(a => a.cancel());
            el.style.zIndex = '';
        }

        _showScoreEffect(el, value) {
            const rect = el.getBoundingClientRect();
            const boardRect = this.boardElement.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            const num = parseFloat(value);
            popup.textContent = (num > 0 ? '+' : '') + (Number.isInteger(num) ? num : num.toFixed(2));
            popup.style.color = num >= 0 ? THEME.scorePositive : THEME.scoreNegative;
            popup.style.left = (rect.left - boardRect.left + rect.width / 2) + 'px';
            popup.style.top  = (rect.top  - boardRect.top  + rect.height / 4) + 'px';
            this.boardElement.appendChild(popup);
            return popup.animate([
                { transform: 'translateX(-50%) translateY(-140%)', opacity: 1, letterSpacing: '-0.4em' },
                { transform: 'translateX(-50%) translateY(-140%)', opacity: 1, letterSpacing: '0.1em'  },
                { transform: 'translateX(-50%) translateY(-140%)', opacity: 1 },
                { transform: 'translateX(-50%) translateY(-140%)', opacity: 0 },
            ], { duration: this._shakeMs, easing: 'ease-out', fill: 'forwards' }).finished.then(() => popup.remove());
        }

        _animateShake(el) {
            return el.animate([
                { transform: 'scale(1)    rotate(0)',     filter: 'drop-shadow(4px 4px 0.5px rgba(0,0,0,0.2))' },
                { transform: 'scale(1.8)  rotate(10deg)', filter: 'drop-shadow(4px 8px 0.5px rgba(0,0,0,0.2))', offset: 0.2 },
                { transform: 'scale(0.7)  rotate(-5deg)', offset: 0.4 },
                { transform: 'scale(1.2)  rotate(2deg)',  filter: 'drop-shadow(4px 8px 0.5px rgba(0,0,0,0.2))',  offset: 0.6 },
                { transform: 'scale(0.9)  rotate(-1deg)', offset: 0.8 },
                { transform: 'scale(1)    rotate(0)',     filter: 'drop-shadow(4px 4px 0.5px rgba(0,0,0,0.2))' },
            ], { duration: this._shakeMs, easing: 'ease-out' }).finished;
        }

        _animateFloat(el) {
            el._floatAnimation?.cancel();
            const delay = -(Math.random() * 3000);
            el._floatAnimation = el.animate([
                { filter: 'drop-shadow(4px 4px 0.5px rgba(0,0,0,0.2))', transform: 'translateY(0px)' },
                { filter: 'drop-shadow(4px 8px 0.5px rgba(0,0,0,0.2))', transform: 'translateY(-4px)', offset: 0.5 },
                { filter: 'drop-shadow(4px 4px 0.5px rgba(0,0,0,0.2))', transform: 'translateY(0px)' },
            ], { duration: 3000, easing: 'ease-in-out', iterations: Infinity, delay });
        }

        _animateThrow(el, dx, dy) {
            const rot = (Math.random() < 0.5 ? 1 : -1) * (270 + Math.random() * 360);
            el.style.zIndex = '999';
            dx = Math.max(-200, Math.min(200, dx))
            dy = Math.max(-200, Math.min(200, dy))
            
            return el.animate([
                { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${dx}px,${dy}px) rotate(${rot}deg)`, opacity: 0 },
            ], { duration: this._transitionMs/2, easing: 'ease-out', fill: 'forwards' }).finished.then(() => el.remove());
        }

        _handleCaptureAndPromotion(el, piece, captured, capturedRow, capturedCol, promotion) {
            if (promotion) el.innerHTML = this._renderPiece(piece);
            if (captured && capturedRow != null) {
                const capturedEl = this.pieceElements.get(this._posKey(capturedRow, capturedCol));
                if (capturedEl) this.pieceElements.delete(this._posKey(capturedRow, capturedCol));
            }
        }

        _squareToPixelCenter(square) {
            const col = square.charCodeAt(0) - 97;
            const row = 8 - parseInt(square[1]);
            const [vRow, vCol] = this._toVisual(row, col);
            const s = this.squareSize;
            return [vCol * s + s / 2, vRow * s + s / 2];
        }

        drawArrow(startSquare, endSquare, color = 'green') {
            const [x1, y1] = this._squareToPixelCenter(startSquare);
            const [x2, y2] = this._squareToPixelCenter(endSquare);
            const s = this.squareSize;
            const boardSize = 8 * s;
            const strokeWidth = s * 0.2;

            const dx = x2 - x1, dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const ux = dx / dist, uy = dy / dist;
            // Shorten path end so arrowhead tip (0.75 * strokeWidth beyond endpoint) lands at target center
            const ex = x2 - ux * strokeWidth * 0.75;
            const ey = y2 - uy * strokeWidth * 0.75;

            const markerId = `arrow-${this._uid}-${Math.random().toString(36).slice(2)}`;
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${boardSize} ${boardSize}`);
            svg.setAttribute('data-arrow', '');
            svg.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:20;width:100%;height:100%';
            svg.innerHTML = `<defs><marker id="${markerId}" markerWidth="2" markerHeight="2.5" refX="1.25" refY="1.25" orient="auto"><path fill="${color}" d="M.3 0 2 1.25.3 2.5z"/></marker></defs><path d="M${x1} ${y1} L${ex} ${ey}" fill="none" opacity=".65" stroke="${color}" stroke-width="${strokeWidth}" marker-end="url(#${markerId})"/>`;
            this.boardElement.appendChild(svg);
            return svg;
        }

        clearArrows() {
            this.boardElement.querySelectorAll('[data-arrow]').forEach(el => el.remove());
        }

        async _animateMove(piece, captured, fromRow, fromCol, toRow, toCol, capturedRow, capturedCol, promotion = false, effect = null) {
            const fromKey = this._posKey(fromRow, fromCol);
            const el = this.pieceElements.get(fromKey);
            if (!el) return;

            const [vToRow, vToCol] = this._toVisual(toRow, toCol);
            const [vFromRow, vFromCol] = this._toVisual(fromRow, fromCol);
            const dx = (vToCol - vFromCol) * this.squareSize;
            const dy = (vToRow - vFromRow) * this.squareSize;

            const capturedEl = (captured && capturedRow != null)
                ? this.pieceElements.get(this._posKey(capturedRow, capturedCol))
                : null;


            await this._runSteps(el, [
                el => this._animateSlide(el, dx, dy, vToRow, vToCol),
                el => this._handleCaptureAndPromotion(el, piece, captured, capturedRow, capturedCol, promotion),
                [
                    async () => {
                        const validEffects = effect ? effect.filter(e => e.value != null) : [];
                        for (const e of validEffects) {
                            this._animateShake(el);
                            await this._showScoreEffect(el, e.value);
                        }
                    },
                    () => capturedEl ? this._animateThrow(capturedEl, dx, dy) : Promise.resolve(),
                ],
            ]);

            this.pieceElements.delete(fromKey);
            this.pieceElements.set(this._posKey(toRow, toCol), el);
            this._animateFloat(el);
        }
    }

    class ChessGame {
        constructor(chessboard) {
            this.chess = new Chess();
            
            this.chessboard = chessboard;
            this.chessboard.on('move', data => this.emit('move', data));
            
            this._listeners = {};
        }

        on(event, fn) {
            (this._listeners[event] ??= []).push(fn);
        }

        emit(event, data) {
            (this._listeners[event] ?? []).forEach(fn => fn(data));
        }

        setPiecesFromFen(fen, pieces) {
            this.chess.load(fen);
            this.chessboard.setPiecesFromFen(fen, pieces);
        }

        reset() {
            this.chess.reset();
        }

        moves(options = {}) {
            return this.chess.moves(options);
        }

        move(move, player = null) {
            const chessMove = this.chess.move(move); // Parse stockfish move to chess.js move
            if (!chessMove) return null;

            this.chessboard.move({
                from: chessMove.from,
                to: chessMove.to,
                captured: chessMove.captured,
                promotion: chessMove.promotion,
                isKingsideCastle: chessMove.isKingsideCastle(),
                isQueensideCastle: chessMove.isQueensideCastle(),
                player: player
            });

            return;
        }

        isGameOver() {
            return this.chess.isGameOver();
        }

        turn() {
            return this.chess.turn();   
        }

        fen() {
            return this.chess.fen();
        }

        isCheck() {
            return this.chess.isCheck();
        }

        get(square) {
            return this.chess.get(square);
        }

        getPieceAt(square) {
            return this.chessboard.getPieceAt(square);
        }

    }

    class Effects {

        static PIECE = {
            p:  [{ source: 'piece', sourceType: 'p',  destination: 'add', operation: 'add', value: 1  }],
            n:  [{ source: 'piece', sourceType: 'n',  destination: 'add', operation: 'add', value: 3  }],
            b:  [{ source: 'piece', sourceType: 'b',  destination: 'add', operation: 'add', value: 3  }],
            r:  [{ source: 'piece', sourceType: 'r',  destination: 'add', operation: 'add', value: 5  }],
            q:  [{ source: 'piece', sourceType: 'q',  destination: 'add', operation: 'add', value: 9  }],
            k:  [{ source: 'piece', sourceType: 'k',  destination: 'add', operation: 'add', value: 0  }],
        }

        static MATERIAL = {
            wood:  [{ source: 'material', sourceType: 'wood',  destination: 'add', operation: 'add', value: 50  }],
            gold:  [{ source: 'material', sourceType: 'gold',  destination: 'add', operation: 'add', value: 100 }],
        };

        static STYLE = {
            kiwen: [{ source: 'style',    sourceType: 'kiwen', destination: 'mult', operation: 'add', value: 2  }],
        };

        fromPiece({ material, style, type }, player) {
            if (player !== 'user') return [];
            return [
                ...(Effects.PIECE[type.toLowerCase()] ?? []),
                ...(Effects.MATERIAL[material] ?? []),
                ...(Effects.STYLE[style]       ?? []),
            ];
        }
    }
    
    class ScoreEngine {
        constructor() {
            this.score = 0;
            this._listeners = {};
        }

        on(event, fn) {
            (this._listeners[event] ??= []).push(fn);
        }

        emit(event, data) {
            (this._listeners[event] ?? []).forEach(fn => fn(data));
        }

        reset() {
            this.score = 0;
            this.emit('reset', { score: 0 });
        }

        applyEffects(effects) {
            if (!effects.length) return null;

            const base = effects.filter(e => e.destination === 'add' ).reduce((s, e) => s + e.value, 0);
            const mult = effects.filter(e => e.destination === 'mult').reduce((m, e) => m + e.value, 1);
            const gained = base * mult;

            this.score += gained;
            this.emit('score', { gained, total: this.score, effects });
            return gained;
        }
    }

    const gameOrientation = 'white';
    const effects = new Effects();
    const scoreEngine = new ScoreEngine();
    const chessboard = new Chessboard();
    const chessSet = new ChessSet();
    const chessGame = new ChessGame(chessboard);
    const svgTheme = new SvgPieceTheme();
    const pngTheme = new PngPieceTheme();
    const pieceTheme = new CompositePieceTheme(pngTheme, svgTheme);
    const engine = new StockfishEngine();
    const chessBoardUI = new ChessboardUI('chessboard', {
        orientation: gameOrientation,
        renderPiece: piece => pieceTheme.render(piece)
    });

    chessGame.on('move', ({ piece, captured, fromRow, fromCol, toRow, toCol, capturedRow, capturedCol, promotion, player }) => {
        const pieceEffects = effects.fromPiece(piece, player);
        scoreEngine.applyEffects(pieceEffects);

        chessBoardUI.queueMove(piece, captured, fromRow, fromCol, toRow, toCol, capturedRow, capturedCol, !!promotion, pieceEffects);
    });

    scoreEngine.on('score', score => console.log(score))

    chessSet.addPieces([
        //'P', 'P', 'P', 'P', 'P', 'P', 'P', 'P',
        'R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R',
        'p', 'p', 'p', 'p', 'p', 'p', 'p', 'p',
        'r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'
    ], {style: 'pixel'});

    chessSet.addPieces([
        'P', 'P', 'P', 'P', 'P', 'P', 'P', 'P',
    ], {material: 'wood'});

    resetChessboard();

    async function resetChessboard() {
        chessGame.reset();
        scoreEngine.reset();

        chessSet.shufflePieces();
        chessGame.setPiecesFromFen('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1', chessSet.getPieces());
        chessBoardUI.initBoard(chessboard.getState());

        chessBoardUI.drawArrow('d1', 'h5', '#ff0000');

        if(chessBoardUI._orientation === 'black') {
            const results = await engine.search({ fen: chessGame.fen(), movetime: 100 }); 
            chessGame.move(results[0].move);
        }
    }

    async function randomMove() {
        if (chessGame.isGameOver()) return;

        const moves = chessGame.moves({ verbose: true });
        const pickedMove = moves[Math.floor(Math.random() * moves.length)];

        chessGame.move(pickedMove, 'user');

        if (chessGame.isGameOver()) return;

        const results = await engine.search({ fen: chessGame.fen(), movetime: 200 });
        if (!results) return;

        chessGame.move(results[0].move, 'cpu');
    }

    async function autoMove() {
        if (chessGame.isGameOver()) return;

        let results = await engine.search({ fen: chessGame.fen(), movetime: 10 });
        if (!results) return;

        chessGame.move(results[0].move, 'auto-user');

        if (chessGame.isGameOver()) return;

        results = await engine.search({ fen: chessGame.fen(), movetime: 10 });
        if (!results) return;

        chessGame.move(results[0].move, 'cpu');
    }

    function addRandomPieceToCollection() {
        let types = ['P', 'R', 'N', 'B', 'Q', 'K'];
        
        if(gameOrientation == "black") {
            types = types.map(t => t.toLowerCase());
        }
        
        const randomType = types[Math.floor(Math.random() * types.length)];
        const randomMaterial = Math.random() < 0.5 ? 'gold' : 'wood';
        const piece = new Piece(randomType, { 
            name: chessSet.pieceNames[randomType.toUpperCase()],
            material: randomMaterial 
        });
        chessSet.addPieceObject(piece);
    }
</script>

    <div>
        <button onclick="resetChessboard()">Reset</button>
        <button onclick="randomMove()">Random move</button>
        <button onclick="autoMove()">Auto move</button>
        <button onclick="addRandomPieceToCollection()">Add random piece</button>
    </div>
