<script>
    document.body.style.background = THEME.pageBg;

    class Piece {
        constructor(type, options = {}) {
            this.type = type; // 'R', 'N', 'B', 'Q', 'K', 'P'
            this._originalType = type; // preserved through promotions so deck piece can be reverted
            this.name = options.name || null;
            this.style = options.style || 'classic';
            this.modifiers = new Set(options.modifiers ?? []);
        }

        color() {
            return this.type === this.type.toUpperCase() ? 'w' : 'b';
        }
    }

    class PngPieceTheme {
        constructor() {
            this._styles = {
                standard: {
                    'p': '/sprites/standard/bp.png',
                    'b': '/sprites/standard/bb.png',
                    'r': '/sprites/standard/br.png',
                    'n': '/sprites/standard/bn.png',
                    'q': '/sprites/standard/bq.png',
                    'k': '/sprites/standard/bk.png',

                    'P': '/sprites/standard/wp.png',
                    'B': '/sprites/standard/wb.png',
                    'R': '/sprites/standard/wr.png',
                    'N': '/sprites/standard/wn.png',
                    'Q': '/sprites/standard/wq.png',
                    'K': '/sprites/standard/wk.png',
                },
                rock: {
                    'p': '/sprites/rock.png',
                    'b': '/sprites/rock.png',
                    'r': '/sprites/rock.png',
                    'n': '/sprites/rock.png',
                    'q': '/sprites/rock.png',
                    'k': '/sprites/rock.png',
                    'P': '/sprites/rock.png',
                    'B': '/sprites/rock.png',
                    'R': '/sprites/rock.png',
                    'N': '/sprites/rock.png',
                    'Q': '/sprites/rock.png',
                    'K': '/sprites/rock.png',
                },
                checkers: {
                    'p': '/sprites/checkers/bp.png',
                    'b': '/sprites/checkers/bb.png',
                    'r': '/sprites/checkers/br.png',
                    'n': '/sprites/checkers/bn.png',
                    'q': '/sprites/checkers/bq.png',
                    'k': '/sprites/checkers/bk.png',

                    'P': '/sprites/checkers/wp.png',
                    'B': '/sprites/checkers/wb.png',
                    'R': '/sprites/checkers/wr.png',
                    'N': '/sprites/checkers/wn.png',
                    'Q': '/sprites/checkers/wq.png',
                    'K': '/sprites/checkers/wk.png',
                },
            };
            this._preload();
        }

        _preload() {
            const seen = new Set();
            for (const family of Object.values(this._styles)) {
                for (const path of Object.values(family)) {
                    if (seen.has(path)) continue;
                    seen.add(path);
                    const img = new Image();
                    img.src = path;
                }
            }
        }

        render(piece) {
            const family = this._styles[piece.style] ?? this._styles.standard;
            const path = family[piece.type];
            if (!path) return '';
            const sprite = `style="--sprite:url(${path})"`;
            const modifiers = Object.entries(PngPieceTheme.MODIFIERS)
                .filter(([mod]) => piece.modifiers?.has(mod))
                .map(([, cls]) => `<div class="${cls}" data-sync-delay ${sprite}></div>`)
                .join('');
            const neonClass = piece.modifiers?.has('neon') ? 'neon' : '';
            const glassClass = piece.modifiers?.has('glass') ? 'glass-tint' : '';
            const colorClass = piece.color() === 'b' ? 'piece-black' : 'piece-white';

            return `<div class="piece-modifier-wrapper ${neonClass} ${glassClass} ${colorClass}">
                <img src="${path}" alt="${piece.type}" draggable="false" data-sync-delay>
                ${modifiers}
            </div>`;
        }
    }
    PngPieceTheme.MODIFIERS = {
        holo:        'holo-overlay',
        poly:        'poly-overlay',
        metal:       'metal-overlay',
        shine:       'shine-overlay',
        neon:        'neon-tint',
        glass:       'glass-overlay',
        gold:        'gold-overlay',
        stripes:     'stripes-overlay',
    };

    class ChessSet {
        constructor() {
            this.pieces = [];
        }

        clearPieces() {
            this.pieces = [];
        }

        getPieces() {
            return [...this.pieces];
        }

        addPieces(piecesToAdd, options = {}) {
            piecesToAdd.forEach(type => {
                this.addPiece(type, options);
            });
        }

        addPiece(type, options = {}) {
            this.pieces.push(new Piece(type, {
                name: PIECE_NAMES[type.toUpperCase()],
                ...options
            }));
        }

        addPieceObject(piece) {
            this.pieces.push(piece);
        }

        shufflePieces() {
            for (let i = this.pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [this.pieces[i], this.pieces[j]] = [this.pieces[j], this.pieces[i]];
            }
        }
    }

    // Shared utility: algebraic square (e.g. "e4") → [row, col] (0-indexed, row 0 = rank 8)
    function parseChessPosition(square) {
        const col = square.charCodeAt(0) - 97;
        const row = 8 - parseInt(square[1]);
        return [row, col];
    }

    class Chessboard extends EventEmitter {
        constructor() {
            super();
            this._board = this.createBoard();
            this.pieces = [];
        }

        getState() {
            return this._board.map(row => [...row]);
        }

        getPieceAt(pos) {
            const [row, col] = parseChessPosition(pos);
            return this._board[row][col];
        }

        createBoard() {
            return Array.from({length: 8}, () => Array(8).fill(null));
        }

        setPiecesFromFen(fen, pieces) {
            this.pieces = [...pieces];
            // revert any promotion mutations so deck pieces return to their original type
            this.pieces.forEach(p => { p.type = p._originalType; });
            this._board = this.createBoard();
            const consumed = new Set();

            const rows = fen.split(' ')[0].split('/');
            for (let i = 0; i < 8; i++) {
                let colIndex = 0;
                for (const char of rows[i]) {
                    if (isNaN(parseInt(char))) {
                        const index = this.pieces.findIndex((p, idx) => p.type === char && !consumed.has(idx));
                        if (index !== -1) {
                            this._board[i][colIndex] = this.pieces[index];
                            consumed.add(index);
                        } else {
                            console.warn(`setPiecesFromFen: no deck piece found for FEN char '${char}' at row ${i} col ${colIndex}. Square left empty.`);
                        }
                        colIndex++;
                    } else {
                        colIndex += parseInt(char);
                    }
                }
            }
        }

        move({ from, to, enPassant, promotion, isKingsideCastle, isQueensideCastle, player }) {
            const [fromRow, fromCol] = parseChessPosition(from);
            const [toRow, toCol] = parseChessPosition(to);

            if (isKingsideCastle) {
                const piece = this._board[fromRow][4];
                const rook = this._board[fromRow][7];
                this._board[fromRow][6] = piece;
                this._board[fromRow][5] = rook;
                this._board[fromRow][4] = null;
                this._board[fromRow][7] = null;
                this.emit('move', { piece, captured: null, fromRow, fromCol: 4, toRow: fromRow, toCol: 6, capturedRow: null, capturedCol: null, player });
                this.emit('move', { piece: rook, captured: null, fromRow, fromCol: 7, toRow: fromRow, toCol: 5, capturedRow: null, capturedCol: null, player });
                return;
            }

            if (isQueensideCastle) {
                const piece = this._board[fromRow][4];
                const rook = this._board[fromRow][0];
                this._board[fromRow][2] = piece;
                this._board[fromRow][3] = rook;
                this._board[fromRow][4] = null;
                this._board[fromRow][0] = null;
                this.emit('move', { piece, captured: null, fromRow, fromCol: 4, toRow: fromRow, toCol: 2, capturedRow: null, capturedCol: null, player });
                this.emit('move', { piece: rook, captured: null, fromRow, fromCol: 0, toRow: fromRow, toCol: 3, capturedRow: null, capturedCol: null, player });
                return;
            }

            const piece = this._board[fromRow][fromCol];
            if (!piece) throw new Error(`Chessboard.move: no piece at ${from} (${fromRow},${fromCol})`);

            let captured = this._board[toRow][toCol];
            let capturedRow = toRow, capturedCol = toCol;

            if (enPassant) {
                // en passant: captured pawn sits on moving pawn's rank, destination file
                captured = this._board[fromRow][toCol];
                this._board[fromRow][toCol] = null;
                capturedRow = fromRow;
                capturedCol = toCol;
            }

            if (promotion) {
                piece.type = piece.color() === 'w' ? promotion.toUpperCase() : promotion.toLowerCase();
            }

            this._board[toRow][toCol] = piece;
            this._board[fromRow][fromCol] = null;
            this.emit('move', { piece, captured, fromRow, fromCol, toRow, toCol,
                capturedRow: captured ? capturedRow : null,
                capturedCol: captured ? capturedCol : null,
                promotion: promotion || null, player });
        }
    }

    class ChessboardUI extends EventEmitter {
        constructor(element, options = {}) {
            super();
            this.boardElement = typeof element === 'string' ? document.getElementById(element) : element;
            this.boardElement.classList.add('chessboard-ui');
            this.squareSize = options.squareSize ?? 90;
            this._lightColor = options.lightColor ?? THEME.squareLight;
            this._darkColor = options.darkColor ?? THEME.squareDark;
            this._transitionMs = options.transitionMs ?? 150;
            this._shakeMs = options.shakeMs ?? 500;
            this._renderPiece = options.renderPiece ?? (() => '');
            this._orientation = options.orientation ?? 'w';
            this.pieceElements = new Map();
            this.piecesLayer = null;
            this._styleEl = document.createElement('style');
            document.head.appendChild(this._styleEl);
            this._updateStyles();
        }

        get lightColor() { return this._lightColor; }
        set lightColor(v) { this._lightColor = v; this._updateStyles(); }

        get darkColor() { return this._darkColor; }
        set darkColor(v) { this._darkColor = v; this._updateStyles(); }

        get transitionMs() { return this._transitionMs; }
        set transitionMs(v) { this._transitionMs = v; this._updateStyles(); }

        get shakeMs() { return this._shakeMs; }
        set shakeMs(v) { this._shakeMs = v; this._updateStyles(); }

        _updateStyles() {
            const s = this.squareSize;
            this._styleEl.textContent = `
                .chessboard-ui .chess-square { width: ${s}px; height: ${s}px; }
                .chessboard-ui .chess-square.light { background: ${this._lightColor}; }
                .chessboard-ui .chess-square.dark { background: ${this._darkColor}; }
                .chessboard-ui .piece {
                    position: absolute;
                    width: ${s}px;
                    height: ${s}px;
                    transition: transform ${this._transitionMs}ms ease-in-out;
                    pointer-events: none;
                }
            `;
        }

        initBoard(initialState) {
            this._cancelAnimations();
            this.boardElement.innerHTML = '';
            this.pieceElements.clear();

            const squaresLayer = document.createElement('div');
            for (let i = 0; i < 8; i++) {
                const row = document.createElement('div');
                row.classList.add('chess-row');
                for (let j = 0; j < 8; j++) {
                    const sq = document.createElement('div');
                    sq.classList.add('chess-square', (i + j) % 2 === 0 ? 'light' : 'dark');
                    row.appendChild(sq);
                }
                squaresLayer.appendChild(row);
            }
            this.boardElement.appendChild(squaresLayer);

            this.piecesLayer = document.createElement('div');
            this.piecesLayer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none';
            this.boardElement.appendChild(this.piecesLayer);

            for (let i = 0; i < 8; i++)
                for (let j = 0; j < 8; j++) {
                    const piece = initialState[i][j];
                    if (piece) this.createPieceElement(piece, i, j);
                }
        }

        _posKey(row, col) { return `${row},${col}`; }

        _toVisual(row, col) {
            return this._orientation === 'b' ? [7 - row, 7 - col] : [row, col];
        }

        createPieceElement(piece, row, col) {
            const [vRow, vCol] = this._toVisual(row, col);
            const el = document.createElement('div');
            el.className = 'piece';
            el.style.top = `${vRow * this.squareSize}px`;
            el.style.left = `${vCol * this.squareSize}px`;
            el.innerHTML = this._renderPiece(piece);
            this.piecesLayer.appendChild(el);
            this.pieceElements.set(this._posKey(row, col), el);
            this._animateFloat(el);
            return el;
        }

        _cancelAnimations() {
            this.boardElement.getAnimations?.({ subtree: true }).forEach(a => a.cancel());
        }

        async _animateSlide(el, dx, dy, toRow, toCol) {
            el._floatAnimation?.cancel();
            el._floatAnimation = null;
            el.style.zIndex = '1000';
            await el.animate([
                { transform: 'translate(0px, 0px)' },
                { transform: `translate(${dx}px, ${dy}px)` },
            ], { duration: this._transitionMs, easing: 'ease-in-out', fill: 'forwards' }).finished;
            el.style.top = `${toRow * this.squareSize}px`;
            el.style.left = `${toCol * this.squareSize}px`;
            el.getAnimations().forEach(a => a.cancel());
            el.style.zIndex = '';
        }

        _showScoreEffect(el, value) {
            const rect = el.getBoundingClientRect();
            const boardRect = this.boardElement.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            const num = parseFloat(value);
            popup.textContent = (num > 0 ? '+' : '') + (Number.isInteger(num) ? num : num.toFixed(2));
            popup.style.color = num >= 0 ? THEME.scorePositive : THEME.scoreNegative;
            popup.style.left = (rect.left - boardRect.left + rect.width / 2) + 'px';
            popup.style.top  = (rect.top  - boardRect.top  + rect.height / 4) + 'px';
            this.boardElement.appendChild(popup);
            return popup.animate([
                { transform: 'translateX(-50%) translateY(-140%)', opacity: 1, letterSpacing: '-0.4em' },
                { transform: 'translateX(-50%) translateY(-140%)', opacity: 1, letterSpacing: '0.1em'  },
                { transform: 'translateX(-50%) translateY(-140%)', opacity: 1 },
                { transform: 'translateX(-50%) translateY(-140%)', opacity: 0 },
            ], { duration: this._shakeMs, easing: 'ease-out', fill: 'forwards' }).finished.then(() => popup.remove());
        }

        _animateShake(el) {
            return el.animate([
                { transform: 'scale(1)    rotate(0)',     filter: 'drop-shadow(4px 4px 0.5px rgba(0,0,0,0.2))' },
                { transform: 'scale(1.8)  rotate(10deg)', filter: 'drop-shadow(4px 8px 0.5px rgba(0,0,0,0.2))', offset: 0.2 },
                { transform: 'scale(0.7)  rotate(-5deg)', offset: 0.4 },
                { transform: 'scale(1.2)  rotate(2deg)',  filter: 'drop-shadow(4px 8px 0.5px rgba(0,0,0,0.2))',  offset: 0.6 },
                { transform: 'scale(0.9)  rotate(-1deg)', offset: 0.8 },
                { transform: 'scale(1)    rotate(0)',     filter: 'drop-shadow(4px 4px 0.5px rgba(0,0,0,0.2))' },
            ], { duration: this._shakeMs, easing: 'ease-out' }).finished;
        }

        _animateFloat(el) {
            el._floatAnimation?.cancel();
            const delay = -(Math.random() * 5000);
            el._floatAnimation = el.animate([
                { filter: 'drop-shadow(4px 4px 3px rgba(0,0,0,0.6))', transform: 'translateY(0px)' },
                { filter: 'drop-shadow(4px 8px 3px rgba(0,0,0,0.6))', transform: 'translateY(-4px)', offset: 0.5 },
                { filter: 'drop-shadow(4px 4px 3px rgba(0,0,0,0.6))', transform: 'translateY(0px)' },
            ], { duration: 5000, easing: 'ease-in-out', iterations: Infinity, delay });
            el.querySelectorAll('[data-sync-delay]').forEach(child => {
                child.style.animationDelay = `${delay}ms`;
            });
        }

        _animateThrow(el, dx, dy) {
            const rot = (Math.random() < 0.5 ? 1 : -1) * (270 + Math.random() * 360);
            el.style.zIndex = '999';
            dx = Math.max(-200, Math.min(200, dx))
            dy = Math.max(-200, Math.min(200, dy))
            
            return el.animate([
                { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${dx}px,${dy}px) rotate(${rot}deg)`, opacity: 0 },
            ], { duration: this._transitionMs/2, easing: 'ease-out', fill: 'forwards' }).finished.then(() => el.remove());
        }

        _handleCaptureAndPromotion(el, piece, promotion) {
            if (promotion) el.innerHTML = this._renderPiece(piece);
        }

        _squareToPixelCenter(square) {
            const [row, col] = parseChessPosition(square);
            const [vRow, vCol] = this._toVisual(row, col);
            const s = this.squareSize;
            return [vCol * s + s / 2, vRow * s + s / 2];
        }

        drawArrow(startSquare, endSquare, color = 'green') {
            const [x1, y1] = this._squareToPixelCenter(startSquare);
            const [x2, y2] = this._squareToPixelCenter(endSquare);
            const s = this.squareSize;
            const boardSize = 8 * s;
            const strokeWidth = s * 0.2;

            const dx = x2 - x1, dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const ux = dx / dist, uy = dy / dist;
            // Shorten path end so arrowhead tip (0.75 * strokeWidth beyond endpoint) lands at target center
            const ex = x2 - ux * strokeWidth * 0.75;
            const ey = y2 - uy * strokeWidth * 0.75;

            const markerId = `arrow-${this._uid}-${Math.random().toString(36).slice(2)}`;
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${boardSize} ${boardSize}`);
            svg.setAttribute('data-arrow', '');
            svg.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:20;width:100%;height:100%';
            svg.innerHTML = `<defs><marker id="${markerId}" markerWidth="2" markerHeight="2.5" refX="1.25" refY="1.25" orient="auto"><path fill="${color}" d="M.3 0 2 1.25.3 2.5z"/></marker></defs><path d="M${x1} ${y1} L${ex} ${ey}" fill="none" opacity=".65" stroke="${color}" stroke-width="${strokeWidth}" marker-end="url(#${markerId})"/>`;
            this.boardElement.appendChild(svg);
            return svg;
        }

        clearArrows() {
            this.boardElement.querySelectorAll('[data-arrow]').forEach(el => el.remove());
        }

        // Slides piece to destination and throws captured piece. Updates pieceElements.
        // Call animatePieceEffect() per scored effect after this, then endMove().
        async slideMove({ piece, captured, fromRow, fromCol, toRow, toCol, capturedRow, capturedCol, promotion = false }) {
            const fromKey = this._posKey(fromRow, fromCol);
            const el = this.pieceElements.get(fromKey);
            if (!el) return;

            const [vToRow, vToCol] = this._toVisual(toRow, toCol);
            const [vFromRow, vFromCol] = this._toVisual(fromRow, fromCol);
            const dx = (vToCol - vFromCol) * this.squareSize;
            const dy = (vToRow - vFromRow) * this.squareSize;

            const capturedEl = (captured && capturedRow != null)
                ? this.pieceElements.get(this._posKey(capturedRow, capturedCol))
                : null;

            await this._animateSlide(el, dx, dy, vToRow, vToCol);
            this._handleCaptureAndPromotion(el, piece, promotion);

            if (capturedEl) {
                // Map deletion and DOM removal co-located: no code path can delete one without the other
                this.pieceElements.delete(this._posKey(capturedRow, capturedCol));
                await this._animateThrow(capturedEl, dx, dy);
            }

            this.pieceElements.delete(fromKey);
            this.pieceElements.set(this._posKey(toRow, toCol), el);
        }

        // Shakes piece at square and shows score popup. Returns Promise.
        animatePieceEffect(toRow, toCol, value) {
            const el = this.pieceElements.get(this._posKey(toRow, toCol));
            if (!el) return Promise.resolve();
            this._animateShake(el);
            return this._showScoreEffect(el, value);
        }

        // Starts idle float on piece at destination. Call after all effects are done.
        endMove(toRow, toCol) {
            const el = this.pieceElements.get(this._posKey(toRow, toCol));
            if (el) this._animateFloat(el);
        }
    }

    class ChessGame extends EventEmitter {
        constructor(chessboard) {
            super();
            this.chess = new Chess();

            this.chessboard = chessboard;
            this.chessboard.on('move', data => this.emit('move', data));
        }

        setPiecesFromFen(fen, pieces) {
            this.chess.load(fen);
            this.chessboard.setPiecesFromFen(fen, pieces);
        }

        reset() {
            this.chess.reset();
        }

        moves(options = {}) {
            return this.chess.moves(options);
        }

        move(move, player = null) {
            const chessMove = this.chess.move(move); // Parse stockfish move to chess.js move
            if (!chessMove) return null;

            this.chessboard.move({
                from: chessMove.from,
                to: chessMove.to,
                enPassant: chessMove.isEnPassant(),
                promotion: chessMove.promotion,
                isKingsideCastle: chessMove.isKingsideCastle(),
                isQueensideCastle: chessMove.isQueensideCastle(),
                player: player
            });

            return chessMove;
        }

        isGameOver() {
            return this.chess.isGameOver();
        }

        turn() {
            return this.chess.turn();   
        }

        fen() {
            return this.chess.fen();
        }

        isCheck() {
            return this.chess.isCheck();
        }

        getRawPiece(square) {
            return this.chess.get(square);
        }

        getPieceAt(square) {
            return this.chessboard.getPieceAt(square);
        }

        hasBishopPair(color) {
            return this._boardPieces().filter(p => p.type === 'b' && p.color === color).length >= 2;
        }

        getPieceCount(type, color) {
            return this._boardPieces().filter(p => p.type === type && p.color === color).length;
        }

        _boardPieces() {
            return this.chess.board().flat().filter(Boolean);
        }

    }

    class Effects {
        static PIECE = {
            p:  [{ source: 'piece', sourceType: 'p',  destination: 'add', operation: 'add', value: 10  }],
            n:  [{ source: 'piece', sourceType: 'n',  destination: 'add', operation: 'add', value: 10 }],
            b:  [{ source: 'piece', sourceType: 'b',  destination: 'add', operation: 'add', value: 10 }],
            r:  [{ source: 'piece', sourceType: 'r',  destination: 'add', operation: 'add', value: 10 }],
            q:  [{ source: 'piece', sourceType: 'q',  destination: 'add', operation: 'add', value: 10 }],
            k:  [{ source: 'piece', sourceType: 'k',  destination: 'add', operation: 'add', value: 10 }],
        }

        static STYLE = {
            checkers: [{ source: 'style', sourceType: 'checkers', destination: 'mult', operation: 'mult', value: 10  }],
            rock: [{ source: 'style', sourceType: 'rock', destination: 'mult', operation: 'add', value: 10  }],
        };

        // Each modifier can produce multiple effects; a piece may have several modifiers stacked
        static MODIFIER = {
            holo:    [{ source: 'modifier', sourceType: 'holo',    destination: 'mult', operation: 'add', value: 5   }],
            poly:    [{ source: 'modifier', sourceType: 'poly',    destination: 'mult', operation: 'add', value: 5   }],
            metal:   [{ source: 'modifier', sourceType: 'metal',   destination: 'add',  operation: 'add', value: 5  }],
            shine:   [{ source: 'modifier', sourceType: 'shine',   destination: 'add',  operation: 'add', value: 5  }],
            neon:    [{ source: 'modifier', sourceType: 'neon',    destination: 'mult', operation: 'add', value: 5   }],
            glass:   [{ source: 'modifier', sourceType: 'glass',   destination: 'mult', operation: 'add', value: 5   }],
            gold:    [{ source: 'modifier', sourceType: 'gold',    destination: 'add',  operation: 'add', value: 5  }],
            stripes: [{ source: 'modifier', sourceType: 'stripes', destination: 'add',  operation: 'add', value: 5  }],
        };

        static fromPiece({ style, type, modifiers }) {
            const modifierEffects = modifiers
                ? [...modifiers].flatMap(mod => Effects.MODIFIER[mod.toLowerCase()] ?? [])
                : [];

            return [
                ...(Effects.PIECE[type.toLowerCase()] ?? []),
                ...(Effects.STYLE[style?.toLowerCase()] ?? []),
                ...modifierEffects,
            ];
        }
    }
    
    // Each joker def is a static blueprint.
    // trigger(ctx, state) returns an effect object (same shape as Effects) or null if condition unmet.
    // ctx: { chessGame, lastMove, scoreEngine, playerColor }
    // state: per-instance mutable object for counters, cooldowns, etc.
    const JOKER_DEFS = {
        WILD_JESTER: {
            id: 'WILD_JESTER',
            name: 'Wild Jester',
            description: '+4 mult every move',
            type: 'Q',
            trigger(_ctx, _state) {
                return { source: 'joker', sourceType: 'WILD_JESTER', destination: 'mult', operation: 'add', value: 4 };
            }
        },
        SCHOLAR: {
            id: 'SCHOLAR',
            name: 'Scholar',
            description: 'Bishop pair alive → +50 chips',
            type: 'B',
            trigger({ chessGame, playerColor }, _state) {
                if (!chessGame.hasBishopPair(playerColor)) return null;
                return { source: 'joker', sourceType: 'SCHOLAR', destination: 'add', operation: 'add', value: 50 };
            }
        },
        PREDATOR: {
            id: 'PREDATOR',
            name: 'Predator',
            description: 'Capture move → mult ×2',
            type: 'N',
            trigger({ lastMove }, _state) {
                if (!lastMove?.captured) return null;
                return { source: 'joker', sourceType: 'PREDATOR', destination: 'mult', operation: 'mult', value: 2 };
            }
        },
    };

    // Live joker instance wrapping a def. Holds per-instance state for stateful jokers (counters, cooldowns, etc.).
    class Joker {
        constructor(def, options = {}) {
            this.instanceId = crypto.randomUUID();
            this.defId = def.id;
            this.name = def.name;
            this.description = def.description;
            this.type = options.type || def.type || 'Q';
            this.style = options.style || 'standard';
            this.modifiers = new Set(options.modifiers ?? []);
            this._color = options.color || 'w';
            // Mutable state bag — each def owns its own schema (e.g. { count: 0 })
            this.state = {};
        }

        color() { return this._color; }

        evaluate(ctx) {
            return JOKER_DEFS[this.defId].trigger(ctx, this.state);
        }
    }

    // Maintains ordered list of active Joker instances. collectEffects() returns effect objects ready for ScoreEngine.
    class JokerRegistry extends EventEmitter {
        constructor() {
            super();
            this._active = [];
        }

        add(jokerId, options = {}) {
            if (!JOKER_DEFS[jokerId]) throw new Error(`Unknown joker: ${jokerId}`);
            const joker = new Joker(JOKER_DEFS[jokerId], options);
            this._active.push(joker);
            this.emit('change', [...this._active]);
            return joker;
        }

        getActive() {
            return [...this._active];
        }

        // Remove by instanceId so duplicate jokers can be targeted individually
        remove(instanceId) {
            this._active = this._active.filter(j => j.instanceId !== instanceId);
            this.emit('change', [...this._active]);
        }

        collectEffects(ctx) {
            return this._active
                .map(j => {
                    const effect = j.evaluate(ctx);
                    if (!effect) return null;
                    return { ...effect, sourceInstanceId: j.instanceId };
                })
                .filter(Boolean);
        }
    }

    class ScoreEngine extends EventEmitter {
        constructor() {
            super();
            this.score = 0;
            this.base = 0;
            this.mult = 1;
            this.gained = 0;
        }

        reset() {
            this.score = 0;
            this.base = 0;
            this.mult = 1;
            this.gained = 0;
            this.emit('reset', { score: 0 });
        }

        _applyEffect(effect) {
            if (effect.destination === 'add') {
                if (effect.operation === 'add') this.base += effect.value;
                if (effect.operation === 'mult') this.base *= effect.value;
            }
            if (effect.destination === 'mult') {
                if (effect.operation === 'add') this.mult += effect.value;
                if (effect.operation === 'mult') this.mult *= effect.value;
            }
        }

        // Pre-computes all effects for a move and returns scored snapshots — no event emission, no timing dependency.
        processEffects(effects) {
            const validEffects = effects.filter(e => e.value != null);
            if (!validEffects.length) return [];

            this.base = 0;
            this.mult = 1;
            const snapshots = [];

            for (const [i, effect] of validEffects.entries()) {
                this._applyEffect(effect);
                const isLast = i === validEffects.length - 1;
                if (isLast) {
                    this.gained = this.base * this.mult;
                    this.score += this.gained;
                    snapshots.push({ effect, base: this.base, mult: this.mult, gained: this.gained, total: this.score, isLast: true });
                    this.base = 0;
                    this.mult = 1;
                } else {
                    snapshots.push({ effect, base: this.base, mult: this.mult, isLast: false });
                }
            }
            return snapshots;
        }
    }

    class HudUI {
        constructor(element, options = {}) {
            this._el = typeof element === 'string' ? document.getElementById(element) : element;
            this._buildDOM();
            this._currentTotal = 0;
            this._chain = Promise.resolve();
        }

        _buildDOM() {
            this._el.innerHTML = `
                <div class="hud-panel">
                    <div class="hud-section total-score">
                        <span class="hud-label">Score</span>
                        <span class="hud-value">0</span>
                    </div>
                    <div class="hud-divider"></div>
                    <div class="hud-section last-move">
                        <div class="hud-row">
                            <span class="hud-sub-value gained">&mdash;</span>
                        </div>
                        <div class="hud-row">
                            <span class="hud-row-chips"><span class="hud-sub-value chips"></span></span>
                            <span class="hud-row-x hud-sub-value">X</span>
                            <span class="hud-row-mult"><span class="hud-sub-value mult"></span></span>
                        </div>
                    </div>
                </div>
            `;
            this._scoreVal  = this._el.querySelector('.total-score .hud-value');
            this._chipsVal  = this._el.querySelector('.hud-sub-value.chips');
            this._multVal   = this._el.querySelector('.hud-sub-value.mult');
            this._gainedVal = this._el.querySelector('.hud-sub-value.gained');
        }

        _sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        _enqueue(fn) {
            const result = this._chain.then(() => fn());
            this._chain = result.catch(() => {});
            return result;
        }

        async _runSteps(steps) {
            for (const step of steps) {
                if (Array.isArray(step)) await Promise.all(step.map(s => s()));
                else await step();
            }
        }

        _setAndPulse(el, text, { twist = 0, duration = 200 } = {}) {
            if (el.textContent === text) return Promise.resolve();
            el.innerHTML = [...text].map(ch => `<span class="hud-digit">${ch}</span>`).join('');
            const spans = [...el.querySelectorAll('.hud-digit')];
            if (!spans.length) return Promise.resolve();
            spans.forEach((span, i) => this._startFloat(span, i*1000));
            const anims = spans.map((span, i) =>
                span.animate(
                    [
                        { transform: `scale(1.6) rotate(${twist}deg)` },
                        { transform: `scale(1.3) rotate(${-twist/2}deg)` },
                        { transform: `scale(0.9) rotate(${twist/4}deg)` },
                        { transform: 'scale(1) rotate(0deg)' }
                    ],
                    { duration: duration, delay: i * 50, easing: 'ease-out', fill: 'forwards', composite: 'add' }
                )
            );
            return anims[anims.length - 1].finished;
        }

        // Idle float on a single span — random phase so digits drift out of sync.
        _startFloat(span, delay) {
            // cubic-bezier(0.37,0,0.63,1) approximates sin() acceleration curve at each quarter-period
            span.animate(
                [
                    { transform: 'translateY(0px)',  easing: 'ease-out' },
                    { transform: 'translateY(-1px)', easing: 'ease-in' },
                    { transform: 'translateY(0px)',  easing: 'ease-out' },
                    { transform: 'translateY(1px)',  easing: 'ease-in' },
                    { transform: 'translateY(0px)' },
                ],
                { duration: 2000, delay: delay, iterations: Infinity }
            );
        }

        // Each digit shakes independently in a loop. Fire-and-forget — store anims on el for cancellation.
        _shakeDigits(el, intensity = 1) {
            const s = intensity;
            const spans = [...el.querySelectorAll('.hud-digit')];
            el._shakeAnims = spans.map(span => {
                span.style.transformOrigin = `${Math.random()*100}% ${Math.random()*50}%`;
                const delay    = Math.random() * 60;
                const duration = 200 + Math.random() * 100;
                return span.animate(
                    [
                        { transform: 'rotate(0deg)' },
                        { transform: `rotate(${(-6 + Math.random()*4)*s}deg)` },
                        { transform: `rotate(${(5  + Math.random()*4)*s}deg)` },
                        { transform: 'rotate(0deg)' },
                    ],
                    { duration, delay, easing: 'linear', iterations: Infinity, composite: 'add' }
                );
            });
        }

        _stopShakeDigits(el) {
            el._shakeAnims?.forEach(a => a.cancel());
            el._shakeAnims = null;
        }

        // Ticks a number from `from` to `to` over `duration` ms, writing plain text directly.
        _animateCount(el, from, to, duration, format = v => `${v}`) {
            if (el._countRaf) cancelAnimationFrame(el._countRaf);
            return new Promise(resolve => {
                const start = performance.now();
                const tick = (now) => {
                    const t = Math.min((now - start) / duration, 1);
                    el.textContent = format(Math.round(from + (to - from) * t));
                    if (t < 1) {
                        el._countRaf = requestAnimationFrame(tick);
                    } else {
                        el._countRaf = null;
                        if (to === 0) el.textContent = '';
                        resolve();
                    }
                };
                el._countRaf = requestAnimationFrame(tick);
            });
        }

        updatePartial({ base, mult }) {
            return this._enqueue(() => this._runSteps([
                [
                    () => this._setAndPulse(this._chipsVal, base > 0 ? `${base}` : '0'),
                    () => this._setAndPulse(this._multVal, `${mult}`, { twist: 30, duration: 300 }),
                ],
            ]));
        }

        update({ gained, total, base, mult }) {
            const prevTotal = this._currentTotal;
            return this._enqueue(() => this._runSteps([
                [
                    () => this._setAndPulse(this._chipsVal, base > 0 ? `${base}` : '0'),
                    () => this._setAndPulse(this._multVal, `${mult}`, { twist: 30, duration: 300 }),
                ],
                () => this._sleep(500),
                [
                    () => this._setAndPulse(this._chipsVal, '0'),
                    () => this._setAndPulse(this._multVal, '0', { twist: 30, duration: 300 }),
                    () => this._setAndPulse(this._gainedVal, gained > 0 ? `${gained}` : ''),
                ],
                () => { this._stopShakeDigits(this._gainedVal); this._shakeDigits(this._gainedVal, 0.5); },
                () => this._sleep(1000),
                [
                    () => { this._stopShakeDigits(this._gainedVal); return this._animateCount(this._gainedVal, gained, 0, Math.min(gained*10, 300)); },
                    () => this._animateCount(this._scoreVal, prevTotal, total, Math.min(total*10, 300), v => v.toLocaleString()),
                ],
                () => { this._currentTotal = total; },
            ]));
        }

        reset({ score }) {
            this._chain = Promise.resolve();
            this._currentTotal = score;
            this._enqueue(() => this._runSteps([
                [
                    () => this._setAndPulse(this._scoreVal, score.toLocaleString()),
                    () => this._setAndPulse(this._chipsVal, '0'),
                    () => this._setAndPulse(this._multVal, '0', { twist: 30, duration: 300 }),
                    () => { this._stopShakeDigits(this._gainedVal); return this._setAndPulse(this._gainedVal, ''); },
                ],
            ]));
        }
    }

    // Renders active jokers as cards. animateEffect() is called by AnimationCoordinator for joker-sourced effects.
    class JokersUI {
        constructor(element, renderPiece) {
            this._el = typeof element === 'string' ? document.getElementById(element) : element;
            this._renderPiece = renderPiece;
            this._jokers = [];
            this._cardEls = new Map(); // instanceId -> card element
        }

        render(jokers) {
            this._el.innerHTML = '';
            this._cardEls.clear();
            this._jokers = [...jokers];
            for (const joker of this._jokers) {
                const card = this._buildCard(joker);
                this._cardEls.set(joker.instanceId, card);
                this._el.appendChild(card);
            }
        }

        _buildCard(joker) {
            const card = document.createElement('div');
            card.className = 'joker-card';
            card.innerHTML = `
                <div class="joker-sprite">${this._renderPiece(joker)}</div>
                <div class="joker-name">${joker.name}</div>
                <div class="joker-desc">${joker.description}</div>
            `;
            return card;
        }

        animateEffect(instanceId, value) {
            const el = this._cardEls.get(instanceId);
            if (!el) return Promise.resolve();
            return this._animate(el, value);
        }

        _animate(el, value) {
            const popup = document.createElement('div');
            popup.className = 'joker-score-popup';
            const num = parseFloat(value);
            popup.textContent = (num > 0 ? '+' : '') + num;
            el.appendChild(popup);
            el.animate([
                { transform: 'scale(1.5)' },
                { transform: 'scale(1)' },
            ], { duration: 200, easing: 'ease-out' });
            return popup.animate([
                { transform: 'translateX(-50%) translateY(0)', opacity: 1 },
                { transform: 'translateX(-50%) translateY(-32px)', opacity: 0 },
            ], { duration: 600, easing: 'ease-out', fill: 'forwards' }).finished.then(() => popup.remove());
        }
    }

    // Owns the move animation queue. Pre-scores effects via ScoreEngine (no timing dependency),
    // then drives ChessboardUI and HudUI animations in sync: per effect, both UIs animate in parallel.
    class AnimationCoordinator {
        constructor(boardUI, hudUI, scoreEngine, jokerUI = null) {
            this._boardUI = boardUI;
            this._hudUI = hudUI;
            this._scoreEngine = scoreEngine;
            this._jokerUI = jokerUI;
            this._queue = [];
            this._draining = false;
            this._gen = 0;
            this._onDrain = null;
        }

        enqueue(move, effects) {
            this._queue.push({ move, effects });
            if (!this._draining) this._drain();
        }

        // Resolves when the queue is fully drained (or immediately if already idle)
        done() {
            if (!this._draining) return Promise.resolve();
            return new Promise(res => {
                const prev = this._onDrain;
                this._onDrain = () => { prev?.(); res(); };
            });
        }

        async _drain() {
            this._draining = true;
            const gen = this._gen;
            while (this._queue.length) {
                if (this._gen !== gen) break;
                const item = this._queue.shift();
                try {
                    await this._process(item, gen);
                } catch {
                    if (this._gen !== gen) break;
                }
            }
            this._draining = false;
            const cb = this._onDrain;
            this._onDrain = null;
            cb?.();
        }

        async _process({ move, effects }, gen) {
            // Score computed synchronously — no dependency on animation timing
            const snapshots = this._scoreEngine.processEffects(effects);

            await this._boardUI.slideMove(move);
            if (this._gen !== gen) return;

            for (const snap of snapshots) {
                // Route joker effects to joker card, piece effects to board square
                const fxAnim = snap.effect.source === 'joker' && this._jokerUI
                    ? this._jokerUI.animateEffect(snap.effect.sourceInstanceId, snap.effect.value)
                    : this._boardUI.animatePieceEffect(move.toRow, move.toCol, snap.effect.value);
                const hudAnim = snap.isLast
                    ? this._hudUI.update(snap)
                    : this._hudUI.updatePartial(snap);
                await Promise.all([fxAnim, hudAnim]);
                if (this._gen !== gen) return;
            }

            this._boardUI.endMove(move.toRow, move.toCol);
        }

        reset() {
            this._queue = [];
            this._gen++;
            // _draining stays true until the in-flight _drain() exits naturally
        }
    }

    const PLAYER_COLOR = 'w';
    const scoreEngine = new ScoreEngine();
    const chessboard = new Chessboard();
    const chessSet = new ChessSet();
    const chessGame = new ChessGame(chessboard);
    const pngTheme = new PngPieceTheme();
    const engine = new StockfishEngine();
    const chessBoardUI = new ChessboardUI('chessboard', {
        orientation: PLAYER_COLOR,
        renderPiece: piece => pngTheme.render(piece)
    });

    const hudUI = new HudUI('hud');
    const jokerRegistry = new JokerRegistry();
    const jokersUI = new JokersUI('jokers', piece => pngTheme.render(piece));
    const animationCoordinator = new AnimationCoordinator(chessBoardUI, hudUI, scoreEngine, jokersUI);

    jokerRegistry.on('change', jokers => jokersUI.render(jokers));

    jokerRegistry.add('WILD_JESTER', { modifiers: ['holo'] });
    jokerRegistry.add('SCHOLAR', { modifiers: ['gold'] });
    jokerRegistry.add('PREDATOR');

    chessGame.on('move', move => {
        if (move.player !== PLAYER.USER) {
            animationCoordinator.enqueue({ ...move, promotion: !!move.promotion }, []);
            return;
        }
        const pieceEffects = Effects.fromPiece(move.piece);
        const jokerCtx = { chessGame, lastMove: move, scoreEngine, playerColor: PLAYER_COLOR };
        const jokerEffects = jokerRegistry.collectEffects(jokerCtx);
        animationCoordinator.enqueue({ ...move, promotion: !!move.promotion }, [...pieceEffects, ...jokerEffects]);
    });

    scoreEngine.on('reset', data => hudUI.reset(data));

    const randomSubset = (arr, max) => { // no need to use fisher-yates, test function only
        const count = Math.floor(Math.random() * (max + 1)); // 0..max
        const shuffled = [...arr].sort(() => Math.random() - 0.5); // no need to use fisher-yates, test function only
        return shuffled.slice(0, count);
    };
    for (const type of ['P','P','P','P','P','P','P','P','p','p','p','p','p','p','p','p','r','n','b','q','k','b','n','r','R','N','B','Q','K','B','N','R']) {
        chessSet.addPiece(type, {
            modifiers: randomSubset(ALL_MODIFIERS, 3), // no need to use fisher-yates, test function only
            //style: ALL_STYLES[Math.floor(Math.random() * ALL_STYLES.length)],
        });
    }

    let _moveInProgress = false;

    (async () => { await resetChessboard(); })();

    async function resetChessboard() {
        if (_moveInProgress) return;
        animationCoordinator.reset();
        chessGame.reset();
        scoreEngine.reset();

        chessSet.shufflePieces();
        chessGame.setPiecesFromFen('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1', chessSet.getPieces());
        chessBoardUI.initBoard(chessboard.getState());

        //chessBoardUI.drawArrow('d1', 'h5', '#ff0000');
        console.log(chessGame)
        if(PLAYER_COLOR === 'b') {
            const results = await engine.search({ fen: chessGame.fen(), movetime: 100 }); 
            chessGame.move(results[0].move);
        }
    }

    async function randomMove() {
        if (_moveInProgress || chessGame.isGameOver()) return;
        _moveInProgress = true;
        try {
            const moves = chessGame.moves({ verbose: true });
            const pickedMove = moves[Math.floor(Math.random() * moves.length)];

            chessGame.move(pickedMove, PLAYER.USER);

            if (chessGame.isGameOver()) return;

            const results = await engine.search({ fen: chessGame.fen(), movetime: 100 });

            chessGame.move(results[0].move, PLAYER.CPU);
        } finally {
            await animationCoordinator.done();
            _moveInProgress = false;
        }
    }

    async function autoMove() {
        if (_moveInProgress || chessGame.isGameOver()) return;
        _moveInProgress = true;
        try {
            let results = await engine.search({ fen: chessGame.fen(), movetime: 10 });
            chessGame.move(results[0].move, PLAYER.AUTO);

            if (chessGame.isGameOver()) return;

            results = await engine.search({ fen: chessGame.fen(), movetime: 10 });
            chessGame.move(results[0].move, PLAYER.CPU);
        } finally {
            await animationCoordinator.done();
            _moveInProgress = false;
        }
    }


    initProceduralBackground();
</script>
